<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h2>Set New Password</h2>

<input type="password" id="newPassword" placeholder="New Password">
<button onclick="updatePassword()">Update Password</button>

<script>
const SUPABASE_URL = "https://afncoixfquvrgycnvvmv.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFmbmNvaXhmcXV2cmd5Y252dm12Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MjA2MjksImV4cCI6MjA5MjM5NjYyOX0.yBAAoB3PcVYXMl4wvIN11bW_nxEmf4CQqWGn-D66NRI";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

async function updatePassword() {
  const password = document.getElementById("newPassword").value;

  if (!password) {
    alert("Enter a password");
    return;
  }

  const { error } = await db.auth.updateUser({
    password: password
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Password updated!");
  window.location.href = "index.html";
}
</script>

</body>
</html>
